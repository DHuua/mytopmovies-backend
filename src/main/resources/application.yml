spring:
  application:
    name: mytopmovies-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  tmdb:
    base-url: https://api.themoviedb.org/3
    api-key: ${TMDB_API_KEY}
    image-base-url: ${APP_TMDB_IMAGE_BASE_URL}

springdoc:
  swagger-ui:
    path: /docs

logging:
  level:
    root: INFO
    com.mytopmovies: DEBUG